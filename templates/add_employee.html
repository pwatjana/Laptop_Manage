<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container form-container">
        <h1>Add New Employee</h1>
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="hp-field"><input type="text" name="website_url"></div>

            <div class="form-group"><label>Employee Code</label><input type="text" name="code" required></div>
            <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Section Code</label><input type="text" name="section_code"></div>
            <div class="form-group"><label>Section Name</label><input type="text" name="section_name"></div>
            <div class="form-group"><label>Join Date</label><input type="date" name="join_date"></div>
            <div class="form-group"><label>Last Date</label><input type="date" name="last_date"></div>
            <div class="form-group"><label>Remark</label><textarea name="remark"></textarea></div>
            <button type="submit" class="btn primary">Save Employee</button>
            <a href="{{ url_for('list_employees') }}" class="btn secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
