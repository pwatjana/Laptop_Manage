{% extends "layout.html" %}

{% block title %}Add Employee - IT Resource Manager{% endblock %}

{% block content %}
<div class="top-header">
    <div>
        <h1 class="page-title">Add Employee</h1>
        <p style="color: var(--text-secondary); margin-top: 4px; font-size: 0.9rem;">Register a new corporate user profile in the database</p>
    </div>
    <a href="{{ url_for('list_employees') }}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i> Back to Directory
    </a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_employee') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <!-- Honeypot Field -->
        <div class="hp-field">
            <label for="website_url">Do not fill this field:</label>
            <input type="text" name="website_url" id="website_url" tabindex="-1" autocomplete="off">
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label for="code">Employee Code *</label>
                <input type="text" id="code" name="code" required placeholder="e.g. EMP-001" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Jane Doe" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="section">Section</label>
                <input type="text" id="section" name="section" placeholder="e.g. GA, HR, Account, IT" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="join_date">Join Date</label>
                <input type="text" id="join_date" name="join_date" placeholder="e.g. 6/1/2019">
            </div>

            <div class="form-group">
                <label for="resign_date">Resign Date (Offboarding Only)</label>
                <input type="text" id="resign_date" name="resign_date" placeholder="e.g. 12/31/2069">
            </div>
        </div>

        <div class="form-actions">
            <button type="reset" class="btn btn-secondary">Reset Form</button>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save"></i> Save Employee
            </button>
        </div>
    </form>
</div>
{% endblock %}
