{% extends "layout.html" %}

{% block title %}Edit Employee {{ employee.Employee_code }} - IT Resource Manager{% endblock %}

{% block content %}
<div class="top-header">
    <div>
        <h1 class="page-title">Edit Employee ({{ employee.Employee_code }})</h1>
        <p style="color: var(--text-secondary); margin-top: 4px; font-size: 0.9rem;">Modify properties and registration details of this employee profile</p>
    </div>
    <a href="{{ url_for('list_employees') }}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i> Back to Directory
    </a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('edit_employee', code=employee.Employee_code) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <!-- Honeypot Field -->
        <div class="hp-field">
            <label for="website_url">Do not fill this field:</label>
            <input type="text" name="website_url" id="website_url" tabindex="-1" autocomplete="off">
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Employee Code</label>
                <input type="text" value="{{ employee.Employee_code }}" disabled style="background: rgba(255,255,255,0.03); color: var(--text-muted); border-color: rgba(255,255,255,0.04);">
            </div>

            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required value="{{ employee.Employee_full_name }}">
            </div>

            <div class="form-group">
                <label for="section">Section</label>
                <input type="text" id="section" name="section" value="{{ employee.Section or '' }}">
            </div>

            <div class="form-group">
                <label for="join_date">Join Date</label>
                <input type="text" id="join_date" name="join_date" value="{{ employee.Join_date or '' }}">
            </div>

            <div class="form-group">
                <label for="resign_date">Resign Date (Offboarding Only)</label>
                <input type="text" id="resign_date" name="resign_date" value="{{ employee.Resign_Date or '' }}">
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('list_employees') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save"></i> Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
