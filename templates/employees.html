<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ url_for('index') }}" class="btn secondary">← Back to Dashboard</a>
            <h1>👥 Employee Directory</h1>
            <a href="{{ url_for('add_employee') }}" class="btn primary">Add New Employee</a>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Code</th><th>Full Name</th><th>Section</th><th>Join Date</th><th>Remark</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp['EmployeeCode'] }}</td>
                    <td>{{ emp['FullName'] }}</td>
                    <td>{{ emp['SectionName'] }} ({{ emp['SectionCode'] }})</td>
                    <td>{{ emp['JoinDate'] }}</td>
                    <td>{{ emp['Remark'] }}</td>
                    <td>
                        <a href="{{ url_for('edit_employee', code=emp['EmployeeCode']) }}" class="btn edit">Edit</a>
                        <a href="{{ url_for('delete_employee', code=emp['EmployeeCode']) }}" class="btn delete" onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
