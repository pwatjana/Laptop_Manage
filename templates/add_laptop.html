{% extends "layout.html" %}

{% block title %}Add New Laptop - IT Resource Manager{% endblock %}

{% block content %}
<div class="top-header">
    <div>
        <h1 class="page-title">Add New Laptop</h1>
        <p style="color: var(--text-secondary); margin-top: 4px; font-size: 0.9rem;">Register a new hardware asset in the inventory pool</p>
    </div>
    <a href="{{ url_for('list_laptops') }}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i> Back to Pool
    </a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_laptop') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <!-- Honeypot Field -->
        <div class="hp-field">
            <label for="website_url">Do not fill this field:</label>
            <input type="text" name="website_url" id="website_url" tabindex="-1" autocomplete="off">
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label for="sn">Serial Number (S/N) *</label>
                <input type="text" id="sn" name="sn" required placeholder="e.g. SN-DELL-8329A" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="no">No.</label>
                <input type="number" id="no" name="no" placeholder="e.g. 1" min="1" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="asset_number">Asset Number</label>
                <input type="text" id="asset_number" name="asset_number" placeholder="e.g. AST-2026-001" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="rfid">RFID</label>
                <input type="text" id="rfid" name="rfid" placeholder="e.g. E28011302000A1" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="brand">Brand *</label>
                <input type="text" id="brand" name="brand" required placeholder="e.g. Dell, Lenovo, HP" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="purchase_date">Date of Purchase</label>
                <input type="text" id="purchase_date" name="purchase_date" placeholder="e.g. 3/15/2021" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="eol_date">Date End of Life</label>
                <input type="text" id="eol_date" name="eol_date" placeholder="e.g. 3/15/2027" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="warranty_type">Warranty Type</label>
                <input type="text" id="warranty_type" name="warranty_type" placeholder="e.g. Premium Plus" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="warranty_period">Warranty Period / Expiration</label>
                <input type="text" id="warranty_period" name="warranty_period" placeholder="e.g. 3/15/2026" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="Active" selected>Active</option>
                    <option value="Available">Available</option>
                    <option value="Assigned">Assigned</option>
                    <option value="In Repair">In Repair</option>
                    <option value="EOL">EOL</option>
                    <option value="Warranty Expired">Warranty Expired</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="reset" class="btn btn-secondary">Reset Form</button>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save"></i> Save Laptop
            </button>
        </div>
    </form>
</div>
{% endblock %}
