<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop & Employee Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 Corporate Resource Dashboard</h1>
        </header>
        
        <div class="dashboard-grid">
            <div class="card">
                <h2>💻 Laptops</h2>
                <p class="count">{{ laptop_count }} Units</p>
                <a href="{{ url_for('list_laptops') }}" class="btn primary">Manage Laptops</a>
            </div>
            
            <div class="card">
                <h2>👥 Employees</h2>
                <p class="count">{{ employee_count }} People</p>
                <a href="{{ url_for('list_employees') }}" class="btn primary">Manage Employees</a>
            </div>
        </div>
    </div>
</body>
</html>
